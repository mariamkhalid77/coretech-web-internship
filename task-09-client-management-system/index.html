<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard">

  <div class="card">
    <h3>Total Clients</h3>
    <p id="totalClients">0</p>
  </div>

  <div class="card">
    <h3>Pending</h3>
    <p id="pendingClients">0</p>
  </div>

  <div class="card">
    <h3>In Progress</h3>
    <p id="progressClients">0</p>
  </div>

  <div class="card">
    <h3>Completed</h3>
    <p id="completedClients">0</p>
  </div>

</div>

<div class="container">

<h1>Client Management System</h1>

<input
type="text"
id="searchInput"
placeholder="Search Client..."
>

<form id="clientForm">

<input
type="text"
id="name"
placeholder="Client Name"
required
>

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="text"
id="phone"
placeholder="Phone"
required
>

<input
type="text"
id="company"
placeholder="Company Name"
required
>

<input
type="text"
id="project"
placeholder="Project Type"
required
>

<select id="status">
<option value="Pending">Pending</option>
<option value="In Progress">In Progress</option>
<option value="Completed">Completed</option>
</select>

<button type="submit">
Save Client
</button>

</form>

<div id="clientsContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
